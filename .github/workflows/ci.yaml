name: CI Pipeline
on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop
jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          pytest

      - name: Validate Python files
        run: |
          cd backend
          python -m compileall .

      - name: Build the docker image
        run: |
          docker build -t water-backend ./backend
      - name: Build the docker image
        run: |
          docker build -t water-frontend ./frontend
      - name: Push to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker tag water-backend:latest ${{ secrets.DOCKER_USERNAME }}/water-backend:latest
          docker tag water-frontend:latest ${{ secrets.DOCKER_USERNAME }}/water-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/water-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/water-frontend:latest