name: CD on Self-Hosted Runner
on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    # This must match the label of your self-hosted runner
    runs-on: self-hosted 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        # We login so the runner has permission to pull private images
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull and Run Images
        run: |
          # Pull the latest versions to ensure we aren't using old cached layers
          sudo docker compose -f docker-compose.yml pull

          # Re-create containers with the new images
          # --remove-orphans cleans up services removed from the config file
          docker compose -f docker-compose.yml up -d --remove-orphans